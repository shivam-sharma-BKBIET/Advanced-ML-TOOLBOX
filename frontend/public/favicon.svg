<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect width="460" height="460" x="26" y="26" rx="100" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.15"/>
  
  <g transform="translate(256, 230)" filter="url(#glow)">
    <path d="M-80,40 L-40,-60 L0,20 L40,-60 L80,40" fill="none" stroke="url(#accent)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-40,80 L80,80" fill="none" stroke="url(#accent)" stroke-width="36" stroke-linecap="round"/>
  </g>
  <circle cx="360" cy="310" r="24" fill="#fbbf24" filter="url(#glow)"/>
</svg>